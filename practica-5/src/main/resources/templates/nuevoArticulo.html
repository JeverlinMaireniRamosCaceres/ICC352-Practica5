<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo artículo</title>
    <link rel="stylesheet" href="/css/estilos.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Playfair+Display:700,900" rel="stylesheet">
</head>

<body>

<div class="container">
    <header class="blog-header py-3">
        <div class="row flex-nowrap justify-content-between align-items-center">
            <!-- TITULO DEL BLOG-->
            <div class="col-4 text-center">
                <a class="blog-header-logo pl-4" href="/">El blog académico</a>
            </div>
        </div>
    </header>
</div>

<div class="container mt-5">


    <h2 class="mb-4"
        th:text="${editando} ? 'Editar artículo' : 'Crear nuevo artículo'">
    </h2>


    <form method="post"
          th:action="${editando} ? @{'/articulos/' + ${articulo.id} + '/actualizar'} : @{/articulos}">
        <div class="mb-3">
            <label class="form-label">Título</label>
            <input type="text" name="titulo" class="form-control"
                   th:value="${editando} ? ${articulo.titulo} : ''"
                   required>

        </div>

        <div class="mb-3">
            <label class="form-label">Contenido</label>
            <textarea name="contenido" class="form-control" rows="6"
                      th:text="${editando} ? ${articulo.cuerpo} : ''"
                      required></textarea>

        </div>

        <div class="mb-3">
            <label class="form-label">Etiquetas (separadas por coma)</label>
            <input type="text"
                   name="etiquetas"
                   class="form-control"
                   th:value="${editando} ? ${etiquetasTexto} : ''">

        </div>

        <button type="submit" class="btn btn-primary">
            Publicar
        </button>

        <a href="/" class="btn btn-secondary ms-2">
            Cancelar
        </a>
    </form>

</div>
</body>
</html>
