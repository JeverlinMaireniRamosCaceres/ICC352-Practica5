<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nuevo usuario</title>
    <link rel="stylesheet" href="/css/estilos.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Playfair+Display:700,900" rel="stylesheet">
</head>

<body>

<div class="container">
  <header class="blog-header py-3">
    <div class="row flex-nowrap justify-content-between align-items-center">
      <!-- TITULO DEL BLOG-->
      <div class="col-4 text-center">
        <a class="blog-header-logo pl-4" href="/">El blog académico</a>
      </div>
    </div>
  </header>
</div>

<div class="container py-4">

  <!-- HEADER -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">Usuarios</h2>

    <!-- BOTON CREAR NUEVO USUARIO -->
    <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalNuevoUsuario">
       Nuevo usuario
    </button>
  </div>

  <!-- Tabla usuarios -->
  <div class="table-responsive">
    <table class="table table-hover align-middle">
      <thead class="table-light">
      <tr>
        <th>Username</th>
        <th>Nombre</th>
        <th>Foto</th>
        <th>Roles</th>
        <th class="text-end">Acciones</th>
      </tr>
      </thead>

        <tbody>
        <th:block th:each="u : ${usuarios}">

            <tr>
                <td th:text="${u.username}"></td>
                <td th:text="${u.nombre}"></td>

                <td>
                    <img th:if="${u.fotoBase64 != null}"
                         th:src="'data:' + ${u.fotoMimeType} + ';base64,' + ${u.fotoBase64}"
                         class="rounded-circle"
                         style="width:40px;height:40px;object-fit:cover;cursor:pointer;"
                         data-bs-toggle="modal"
                         th:data-bs-target="'#modalFoto' + ${u.id}">
                    <span th:if="${u.fotoBase64 == null}" class="text-muted">—</span>
                </td>

                <td>
                    <span th:if="${u.administrador}" class="badge text-bg-danger">Admin</span>
                    <span th:if="${u.autor}" class="badge text-bg-primary">Autor</span>
                    <span th:if="${u.usuarioNormal}" class="badge text-bg-secondary">Usuario</span>
                </td>

                <td class="text-end">
                    <a class="btn btn-sm btn-warning"
                       th:href="@{'/usuarios/editarUsuario?username=' + ${u.username}}">
                        Editar
                    </a>

                    <form method="post"
                          th:action="@{'/usuarios/' + ${u.username} + '/eliminar'}"
                          class="d-inline"
                          onsubmit="return confirm('¿Seguro que quieres eliminar este usuario?');">
                        <button type="submit" class="btn btn-sm btn-danger">Eliminar</button>
                    </form>
                </td>
            </tr>

            <!-- MODAL PARA VER FOTO (dentro del th:block) -->
            <div class="modal fade"
                 th:id="'modalFoto' + ${u.id}"
                 tabindex="-1">
                <div class="modal-dialog modal-dialog-centered modal-lg">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title" th:text="'Foto de ' + ${u.username}">Foto</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body text-center">
                            <img class="img-fluid"
                                 th:src="'data:' + ${u.fotoMimeType} + ';base64,' + ${u.fotoBase64}">
                        </div>
                    </div>
                </div>
            </div>

        </th:block>
        </tbody>

    </table>
  </div>
</div>



</div>

<!-- MODAL PARA CREAR NUEVO USUARIO-->
<div class="modal fade" id="modalNuevoUsuario" tabindex="-1"
     aria-labelledby="modalNuevoUsuarioLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" id="modalNuevoUsuarioLabel">
          Crear nuevo usuario
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <!-- FORM (donde van los metodos) -->
      <form method="post" action="/usuarios" enctype="multipart/form-data">
        <div class="modal-body">

          <div class="mb-3">
            <label class="form-label">Nombre de usuario</label>
            <input type="text" name="username" class="form-control" placeholder="usuario123" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Nombre completo</label>
            <input type="text" name="nombre" class="form-control" placeholder="Juan Pérez" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" name="contrasena" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Foto (opcional)</label>
            <input type="file" name="foto" accept="image/*" class="form-control">
          </div>

          <div class="mb-2">
            <label class="form-label d-block">Rol</label>

            <div class="form-check">
              <input class="form-check-input" type="radio" name="rol" id="rolUsuario" value="USUARIO" checked>
              <label class="form-check-label" for="rolUsuario">Usuario</label>
            </div>

            <div class="form-check">
              <input class="form-check-input" type="radio" name="rol" id="rolAutor" value="AUTOR">
              <label class="form-check-label" for="rolAutor">Autor</label>
            </div>

            <div class="form-check">
              <input class="form-check-input" type="radio" name="rol" id="rolAdmin" value="ADMIN">
              <label class="form-check-label" for="rolAdmin">Administrador</label>
            </div>
          </div>

        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-success">Crear usuario</button>
        </div>
      </form>

    </div>
  </div>
</div>

<!-- MODAL PARA ELIMINAR USUARIO -->
<div class="modal fade" id="modalEliminarUsuario" tabindex="-1"
     aria-labelledby="modalEliminarUsuarioLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" id="modalEliminarUsuarioLabel">Confirmar eliminación</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        ¿Seguro que quieres eliminar este usuario?
        <div class="text-danger mt-2">Esta acción no se puede deshacer.</div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>

        <!-- Form estatico -->
        <form method="post">
          <button type="submit" class="btn btn-danger">Sí, eliminar</button>
        </form>
      </div>

    </div>
  </div>
</div>

<!-- JavaScript de Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
