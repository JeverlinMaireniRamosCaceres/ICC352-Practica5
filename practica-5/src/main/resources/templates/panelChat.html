<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel de Chat</title>
    <link rel="stylesheet" href="/css/estilos.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Playfair+Display:700,900" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<div class="container">

    <header class="blog-header py-3">
        <div class="row flex-nowrap justify-content-between align-items-center">
            <div class="col-4 text-center">
                <a class="blog-header-logo pl-4" href="/">El blog académico</a>
            </div>
            <div class="col-4 d-flex justify-content-end align-items-center">
                <a th:if="${usuario != null and usuario.administrador}"
                   th:href="@{/usuarios/nuevo}"
                   class="btn btn-outline-success btn-sm me-3">
                    Nuevo usuario
                </a>
                <a th:if="${usuario != null and (usuario.administrador or usuario.autor)}"
                   href="/articulos/nuevoArticulo"
                   class="btn btn-sm btn-outline-primary me-3">
                    Crear artículo
                </a>
                <form th:if="${usuario != null}"
                      method="post"
                      action="/logout"
                      class="d-inline">
                    <button class="btn btn-sm btn-outline-danger" type="submit">
                        Logout
                    </button>
                </form>
            </div>
        </div>
    </header>

    <!-- TITULO -->
    <div class="py-4">
        <h2>Panel de Chat</h2>
        <p class="text-muted">Administración y respuesta de las conversaciones activas</p>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="row" style="height: 550px;">

        <!-- LISTA DE USUARIOS -->
        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-header">
                    <strong>Conversaciones activas</strong>
                    <span id="contador-chats" class="badge ms-2">0</span>
                </div>
                <div class="card-body p-0" style="overflow-y: auto;">
                    <div id="lista-usuarios">
                        <p class="text-muted text-center p-3">No hay conversaciones activas</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- CONVERSACION -->
        <div class="col-md-8">
            <div class="card h-100 d-flex flex-column">

                <!-- Header conversacion -->
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span id="nombre-chat-activo">Selecciona una conversación</span>
                </div>

                <!-- Mensajes -->
                <div id="mensajes-panel" class="card-body flex-grow-1"
                     style="overflow-y: auto; background: #F3E5F5;">
                    <p class="text-muted text-center">Selecciona una conversación para ver los mensajes</p>
                </div>

                <!-- Input para responder -->
                <div class="card-footer d-flex gap-2">
                    <input type="text" id="input-respuesta" class="form-control"
                           placeholder="Escribe una respuesta..."
                           onkeypress="if(event.key==='Enter') responderMensaje()">
                    <button class="btn btn-primary" onclick="responderMensaje()">➤</button>
                </div>

            </div>
        </div>

    </div>

    <div class="mb-5"></div>

</div>

<footer class="blog-footer">
    <p>Derechos reservados</p>
    <p>
        <a href="#" class="textoFooter">Volver al inicio</a>
    </p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/panelChat.js"></script>

</body>
</html>
