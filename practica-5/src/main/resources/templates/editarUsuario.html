<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-4">
    <h2 class="mb-4">Editar usuario</h2>

    <form method="post" th:action="@{'/usuarios/' + ${u.username} + '/actualizar'}" enctype="multipart/form-data">

        <div class="mb-3">
            <label class="form-label">Username</label>
            <!-- se muestra bloqueado para que no se pueda editar -->
            <input type="text" class="form-control" th:value="${u.username}" disabled>
        </div>

        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" name="nombre" class="form-control" th:value="${u.nombre}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Contraseña (opcional)</label>
            <input type="password" name="contrasena" class="form-control" placeholder="Dejar en blanco para no cambiar">
        </div>

        <div class="mb-2">
            <label class="form-label d-block">Rol</label>

            <div class="form-check">
                <input class="form-check-input" type="radio" name="rol" id="rolUsuario" value="USUARIO"
                       th:checked="${u.usuarioNormal}">
                <label class="form-check-label" for="rolUsuario">Usuario</label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="radio" name="rol" id="rolAutor" value="AUTOR"
                       th:checked="${u.autor}">
                <label class="form-check-label" for="rolAutor">Autor</label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="radio" name="rol" id="rolAdmin" value="ADMIN"
                       th:checked="${u.administrador}">
                <label class="form-check-label" for="rolAdmin">Administrador</label>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Foto (opcional)</label>
            <input type="file" name="foto" accept="image/*" class="form-control">
        </div>

        <div class="mb-3" th:if="${u.fotoBase64 != null}">
            <label class="form-label d-block">Foto actual</label>
            <img class="img-thumbnail"
                 style="max-width: 160px;"
                 th:src="'data:' + ${u.fotoMimeType} + ';base64,' + ${u.fotoBase64}">
        </div>

        <div class="mt-4">
            <button class="btn btn-primary" type="submit">Guardar cambios</button>
            <a href="/usuarios" class="btn btn-secondary ms-2">Cancelar</a>
        </div>

    </form>
</div>

</body>
</html>
